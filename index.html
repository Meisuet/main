<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>交通及天氣儀表板</title>
<style>
:root {
--bg-color: #0b0c10;
--header-bg: #990000;
--bus-bg: #1f2833;
--weather-bg: #004b87;
--text-color: #ffffff;
--accent-yellow: #f5b041;
--accent-blue: #4af6f6;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
background-color: var(--bg-color);
color: var(--text-color);
display: flex;
flex-direction: column;
height: 100vh;
padding: 10px;
overflow: hidden;
}

.header-section {
background-color: var(--header-bg);
border-radius: 10px;
padding: 15px;
text-align: center;
margin-bottom: 10px;
box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.header-title {
font-size: 14px;
text-transform: uppercase;
letter-spacing: 2px;
color: var(--accent-yellow);
margin-bottom: 5px;
}

.date-display {
font-size: 18px;
font-weight: bold;
letter-spacing: 1px;
}

.time-display {
font-size: 38px;
font-weight: 900;
margin-top: 5px;
font-family: monospace;
}

.transport-section {
flex: 1;
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 10px;
overflow-y: auto;
}

.route-card {
background-color: var(--bus-bg);
border-radius: 10px;
padding: 15px;
display: flex;
flex-direction: column;
justify-content: center;
border-left: 5px solid var(--accent-yellow);
}

.route-info {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 8px;
}

.route-name {
font-size: 24px;
font-weight: bold;
color: var(--accent-yellow);
}

.route-dest {
font-size: 14px;
color: #aaa;
}

.eta-container {
display: flex;
gap: 15px;
font-size: 20px;
font-weight: bold;
font-family: monospace;
}

.eta-time {
background: rgba(255,255,255,0.1);
padding: 5px 10px;
border-radius: 5px;
color: var(--accent-blue);
}

.weather-section {
background-color: var(--weather-bg);
border-radius: 10px;
padding: 15px;
box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.weather-title {
font-size: 12px;
color: #99ccff;
margin-bottom: 8px;
letter-spacing: 1px;
}

.weather-main {
display: flex;
justify-content: space-between;
align-items: center;
}

.temp-display {
font-size: 36px;
font-weight: bold;
}

.weather-details {
font-size: 16px;
text-align: right;
line-height: 1.5;
}

.weather-alert {
margin-top: 8px;
font-size: 12px;
color: #ff4d4d;
font-weight: bold;
background: rgba(0,0,0,0.2);
padding: 5px;
border-radius: 4px;
display: none;
}
</style>
</head>
<body>

<div class="header-section">
<div class="header-title">Tin Shui Station Hub</div>
<div class="date-display" id="current-date">----/--/-- ---</div>
<div class="time-display" id="current-time">00:00:00 AM</div>
</div>

<div class="transport-section">
<div class="route-card">
<div class="route-info">
<span class="route-name">輕鐵 705</span>
<span class="route-dest">天水圍循環線</span>
</div>
<div class="eta-container" id="eta-705">
<span class="eta-time">載入中...</span>
</div>
</div>

<div class="route-card">
<div class="route-info">
<span class="route-name">輕鐵 761P</span>
<span class="route-dest">往 元朗</span>
</div>
<div class="eta-container" id="eta-761p">
<span class="eta-time">載入中...</span>
</div>
</div>

<div class="route-card" style="border-left-color: var(--accent-blue);">
<div class="route-info">
<span class="route-name">巴士 K75P</span>
<span class="route-dest">往 洪水橋</span>
</div>
<div class="eta-container" id="eta-k75p">
<span class="eta-time">載入中...</span>
</div>
</div>
</div>

<div class="weather-section">
<div class="weather-title">HKO REAL-TIME SYSTEM</div>
<div class="weather-main">
<div class="temp-display" id="weather-temp">--°C</div>
<div class="weather-details">
<div id="weather-humidity">濕度: --%</div>
<div id="weather-uv">UV 指數: --</div>
</div>
</div>
<div class="weather-alert" id="weather-alert"></div>
</div>

<script>
function updateClock() {
const now = new Date();
const year = now.getFullYear();
const month = String(now.getMonth() + 1).padStart(2, '0');
const date = String(now.getDate()).padStart(2, '0');
const weekdays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
const day = weekdays[now.getDay()];

let hours = now.getHours();
const ampm = hours >= 12 ? 'PM' : 'AM';
hours = hours % 12;
hours = hours ? hours : 12;
const minutes = String(now.getMinutes()).padStart(2, '0');
const seconds = String(now.getSeconds()).padStart(2, '0');

document.getElementById('current-date').innerText = `${year}/${month}/${date} ${day}`;
document.getElementById('current-time').innerText = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

// 使用免費的 CORS 代理
const proxy = "https://corsproxy.io/?";

async function fetchTransportETA() {
// 1. 獲取輕鐵 705 & 761P (天瑞站 ID: 460)
try {
const lrUrl = 'https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?stationId=460';
const response = await fetch(proxy + encodeURIComponent(lrUrl));
const data = await response.json();

if(data.status === 1 && data.platform_list) {
processLRT(data.platform_list);
} else {
document.getElementById('eta-705').innerHTML = '<span class="eta-time">暫無班次</span>';
document.getElementById('eta-761p').innerHTML = '<span class="eta-time">暫無班次</span>';
}
} catch (e) {
console.error(e);
document.getElementById('eta-705').innerHTML = '<span class="eta-time">讀取失敗</span>';
document.getElementById('eta-761p').innerHTML = '<span class="eta-time">讀取失敗</span>';
}

// 2. 獲取港鐵巴士 K75P
try {
const busUrl = 'https://rt.data.gov.hk/v1/transport/mtr/bus/getSchedule?route=K75P';
const response = await fetch(proxy + encodeURIComponent(busUrl));
const data = await response.json();
if(data.status === 1 && data.bus_list && data.bus_list['K75P']) {
processBus(data.bus_list['K75P']);
} else {
document.getElementById('eta-k75p').innerHTML = '<span class="eta-time">暫無班次</span>';
}
} catch (e) {
console.error(e);
document.getElementById('eta-k75p').innerHTML = '<span class="eta-time">讀取失敗</span>';
}
}

function processLRT(platforms) {
let eta705 = [];
let eta761p = [];

platforms.forEach(platform => {
if(platform.route_list) {
platform.route_list.forEach(route => {
let timeText = route.time_ch || route.time_en;
// 如果顯示為"即將抵達"，縮短文字
if(timeText.includes("即將")) timeText = "即將抵達";

if(route.route_no === '705') {
eta705.push(timeText);
}
if(route.route_no === '761P') {
eta761p.push(timeText);
}
});
}
});

renderETADisplay('eta-705', eta705.slice(0, 2));
renderETADisplay('eta-761p', eta761p.slice(0, 2));
}

function processBus(busList) {
let etaBus = [];
busList.forEach(bus => {
// 篩選靠近天瑞方向的巴士，港鐵巴士一般返回的是倒數分鐘數值
if(bus.departure_time) {
const diffMs = new Date(bus.departure_time) - new Date();
const diffMins = Math.max(0, Math.floor(diffMs / 60000));
if (diffMins === 0) {
etaBus.push("即將抵達");
} else {
etaBus.push(`${diffMins} 分鐘`);
}
}
});
renderETADisplay('eta-k75p', etaBus.slice(0, 2));
}

function renderETADisplay(elementId, etaArray) {
const container = document.getElementById(elementId);
if(etaArray.length === 0) {
container.innerHTML = `<span class="eta-time">暫無班次</span>`;
return;
}
container.innerHTML = etaArray.map(time => `<span class="eta-time">${time}</span>`).join('');
}

async function fetchWeatherData() {
try {
// 天氣 API 一般沒有 CORS 限制，直接獲取即可
const weatherResp = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
const weatherData = await weatherResp.json();

const wetLandParkTemp = weatherData.temperature.data.find(item => item.place === '濕地公園');
const tsimShaTsuiTemp = weatherData.temperature.data.find(item => item.place === '香港天文台');
const currentTemp = wetLandParkTemp ? wetLandParkTemp.value : tsimShaTsuiTemp.value;
document.getElementById('weather-temp').innerText = `${currentTemp} °C`;

const currentHumidity = weatherData.humidity.data[0].value;
document.getElementById('weather-humidity').innerText = `濕度: ${currentHumidity}%`;

if(weatherData.uvindex && weatherData.uvindex.data && weatherData.uvindex.data.length > 0) {
document.getElementById('weather-uv').innerText = `UV 指數: ${weatherData.uvindex.data[0].value}`;
} else {
document.getElementById('weather-uv').innerText = `UV 指數: 0`;
}

// 警告資訊
const warningResp = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
const warningData = await warningResp.json();
const alertEl = document.getElementById('weather-alert');

if (warningData && Object.keys(warningData).length > 0) {
const warnings = Object.values(warningData).map(w => w.name).join(' | ');
alertEl.innerText = `警告: ${warnings}`;
alertEl.style.display = 'block';
} else {
alertEl.style.display = 'none';
}
} catch (e) {
console.error(e);
}
}

function initDataFetch() {
fetchTransportETA();
fetchWeatherData();
}

// 每 60 秒更新一次
setInterval(initDataFetch, 60000);
initDataFetch();
</script>
</body>
</html>
