<!DOCTYPE html>
<html lang="zh-Hant">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>天瑞乘車時間表</title>
   <style>
       :root {
           --bg-color: #0b0c10;
           --header-bg: #990000;
           --bus-bg: #1f2833;
           --weather-bg: #004b87;
           --text-color: #ffffff;
           --accent-lightyellow: #ffda21;
           --accent-yellow: #f5b041;
           --accent-blue: #4af6f6;
       }
       * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
       body {
           background-color: var(--bg-color);
           color: var(--text-color);
           display: flex;
           flex-direction: column;
           height: 100vh;
           padding: 12px;
           overflow: hidden;
       }
       .header-section {
           background-color: var(--header-bg);
           border-radius: 10px;
           padding: 12px;
           text-align: center;
           margin-bottom: 10px;
           box-shadow: 0 4px 6px rgba(0,0,0,0.3);
       }
       .header-title { font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-lightyellow); margin-bottom: 3px; }
       .date-display { font-size: 18px; font-weight: bold; }
       .time-display {
           font-size: 40px;
           font-weight: 900;
           font-family: 'Chicago', monospace;
           letter-spacing: 6px;
           color: #4af6f6;
           line-height: 1;
       }
       .transport-section {
           flex: 1;
           display: flex;
           flex-direction: column;
           gap: 10px;
           margin-bottom: 10px;
           overflow-y: auto;
       }
       .route-card {
           background-color: var(--bus-bg);
           border-radius: 10px;
           padding: 15px;
           display: flex;
           flex-direction: column;
           justify-content: center;
           border-left: 6px solid var(--accent-yellow);
       }
       .route-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
       .route-name { font-size: 26px; font-weight: bold; color: var(--accent-yellow); }
       .route-dest { font-size: 14px; color: #ccc; }
       .eta-container {
           display: flex;
           gap: 12px;
           font-size: 22px;
           font-weight: bold;
           font-family: monospace;
           flex-wrap: wrap;
       }
       .eta-time {
           background: rgba(255,255,255,0.1);
           padding: 6px 12px;
           border-radius: 6px;
           color: var(--accent-blue);
       }
       .weather-section {
           background-color: var(--weather-bg);
           border-radius: 10px;
           padding: 15px;
           box-shadow: 0 4px 6px rgba(0,0,0,0.3);
       }
       .weather-main { display: flex; justify-content: space-between; align-items: center; }
       .temp-display { font-size: 38px; font-weight: bold; }
       .weather-details { font-size: 16px; text-align: right; line-height: 1.6; }
   </style>
</head>
<body>
   <div class="header-section">
       <div class="header-title">Tin Shui MTR/BUS Hub</div>
       <div class="date-display" id="current-date">----/--/-- ---</div>
       <div class="time-display" id="current-time">00:00:00 AM</div>
   </div>
   <div class="transport-section">
       <div class="route-card">
           <div class="route-info">
               <span class="route-name">輕鐵 705</span>
               <span class="route-dest">天水圍循環線</span>
           </div>
           <div class="eta-container" id="eta-705"><span class="eta-time">連線中...</span></div>
       </div>
       <div class="route-card">
           <div class="route-info">
               <span class="route-name">輕鐵 761P</span>
               <span class="route-dest">往 元朗</span>
           </div>
           <div class="eta-container" id="eta-761p"><span class="eta-time">連線中...</span></div>
       </div>
       <div class="route-card" style="border-left-color: var(--accent-blue);">
           <div class="route-info">
               <span class="route-name">港鐵巴士 K75P</span>
               <span class="route-dest">往 洪水橋 (天瑞總站)</span>
           </div>
           <div class="eta-container" id="eta-k75p"><span class="eta-time">連線中...</span></div>
       </div>
   </div>
   <div class="weather-section">
       <div class="weather-main">
           <div class="temp-display" id="weather-temp">--°C</div>
           <div class="weather-details">
               <div id="weather-humidity">濕度: --%</div>
               <div id="weather-place">測量點: 濕地公園</div>
           </div>
       </div>
   </div>
