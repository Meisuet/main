<!DOCTYPE html>
<html lang="zh-Hant">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>天瑞乘車時間表</title>
   <style>
       :root {
           --bg-color: #0b0c10;
           --header-bg: #990000;
           --bus-bg: #1f2833;
           --weather-bg: #004b87;
           --text-color: #ffffff;
           --accent-lightyellow: #ffda21;
           --accent-yellow: #f5b041;
           --accent-blue: #4af6f6;
       }
       * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
       body {
           background-color: var(--bg-color);
           color: var(--text-color);
           display: flex;
           flex-direction: column;
           height: 100vh;
           padding: 12px;
           overflow: hidden;
       }
       .header-section {
           background-color: var(--header-bg);
           border-radius: 10px;
           padding: 12px;
           text-align: center;
           margin-bottom: 10px;
           box-shadow: 0 4px 6px rgba(0,0,0,0.3);
           position: relative;
       }
       .header-title { font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-lightyellow); margin-bottom: 3px; }
       .mode-switch {
           position: absolute;
           top: 12px;
           right: 12px;
           background: rgba(255,255,255,0.15);
           border: none;
           color: white;
           padding: 6px 12px;
           border-radius: 20px;
           font-size: 13px;
           cursor: pointer;
       }
       .date-display { font-size: 18px; font-weight: bold; }
       .time-display {
           font-size: 30px;
           font-weight: 900;
           font-family: 'Chicago', monospace;
           letter-spacing: 3px;
           color: #ffffff;
           line-height: 1;
       }
       .transport-section {
           flex: 1;
           display: flex;
           flex-direction: column;
           gap: 10px;
           margin-bottom: 10px;
           overflow-y: auto;
       }
       .route-card {
           background-color: var(--bus-bg);
           border-radius: 10px;
           padding: 15px;
           display: flex;
           flex-direction: column;
           justify-content: center;
       }
       .lrt-card { border-left: 6px solid var(--accent-yellow); }
       .lrt-card .route-name { color: var(--accent-yellow); }
       .bus-card { border-left: 6px solid var(--accent-blue); }
       .bus-card .route-name { color: var(--accent-blue); }

       .route-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
       .route-name { font-size: 26px; font-weight: bold; }
       .route-dest { font-size: 14px; color: #ccc; }
       .eta-container {
           display: flex;
           gap: 12px;
           font-size: 22px;
           font-weight: bold;
           font-family: monospace;
           flex-wrap: wrap;
       }
       .eta-time {
           background: rgba(255,255,255,0.1);
           padding: 6px 12px;
           border-radius: 6px;
           color: #ffffff;
           min-width: 78px;
           text-align: center;
       }
       .weather-section {
           background-color: var(--weather-bg);
           border-radius: 10px;
           padding: 15px;
           box-shadow: 0 4px 6px rgba(0,0,0,0.3);
       }
       .weather-main { display: flex; justify-content: space-between; align-items: center; }
       .temp-display { font-size: 38px; font-weight: bold; }
       .weather-details { font-size: 16px; text-align: right; line-height: 1.6; }
   </style>
</head>
<body>
   <div class="header-section">
       <div class="header-title" id="header-title">Tin Shui MTR/BUS Hub</div>
       <button class="mode-switch" id="mode-btn">切換至屯門</button>
       <div class="date-display" id="current-date">----/--/-- ---</div>
       <div class="time-display" id="current-time">00:00:00 AM</div>
   </div>
   <div class="transport-section" id="transport-section">
       <!-- 預設顯示天水圍 -->
   </div>
   <div class="weather-section">
       <div class="weather-main">
           <div class="temp-display" id="weather-temp">--°C</div>
           <div class="weather-details">
               <div id="weather-humidity">濕度: --%</div>
               <div id="weather-place">測量點: 濕地公園</div>
           </div>
       </div>
   </div>

   <script>
       let currentMode = 'tinshui'; // 'tinshui' 或 'tuenmun'

       function updateClock() {
           const now = new Date();
           const year = now.getFullYear();
           const month = String(now.getMonth() + 1).padStart(2, '0');
           const date = String(now.getDate()).padStart(2, '0');
           const weekdays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
           const day = weekdays[now.getDay()];
           let hours = now.getHours();
           const ampm = hours >= 12 ? 'PM' : 'AM';
           hours = hours % 12 || 12;
           const minutes = String(now.getMinutes()).padStart(2, '0');
           const seconds = String(now.getSeconds()).padStart(2, '0');
           document.getElementById('current-date').innerText = `${year}/${month}/${date} ${day}`;
           document.getElementById('current-time').innerText = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
       }
       setInterval(updateClock, 1000);
       updateClock();

       function formatToClockTime(timeStr) {
           if (!timeStr || timeStr === "即將抵達" || timeStr === "-") return "即將";
           const num = parseInt(timeStr);
           if (isNaN(num)) return timeStr;
           const now = new Date();
           const future = new Date(now.getTime() + num * 60000);
           let h = future.getHours();
           const m = String(future.getMinutes()).padStart(2, '0');
           h = h % 12 || 12;
           return `${h}:${m}`;
       }

       function renderUI(id, arr) {
           const el = document.getElementById(id);
           if (!arr || arr.length === 0) {
               el.innerHTML = '<span class="eta-time">暫無班次</span>';
               return;
           }
           el.innerHTML = arr.map(t => `<span class="eta-time">${t}</span>`).join('');
       }

       async function fetchTinShui() {
           const section = document.getElementById('transport-section');
           section.innerHTML = `
               <div class="route-card lrt-card">
                   <div class="route-info"><span class="route-name">輕鐵 705</span><span class="route-dest">天水圍循環線</span></div>
                   <div class="eta-container" id="eta-705"><span class="eta-time">連線中...</span></div>
               </div>
               <div class="route-card lrt-card">
                   <div class="route-info"><span class="route-name">輕鐵 761P</span><span class="route-dest">往 元朗</span></div>
                   <div class="eta-container" id="eta-761p"><span class="eta-time">連線中...</span></div>
               </div>
               <div class="route-card bus-card">
                   <div class="route-info"><span class="route-name">港鐵巴士 K75P</span><span class="route-dest">天瑞總站 → 洪水橋</span></div>
                   <div class="eta-container" id="eta-k75p"><span class="eta-time">連線中...</span></div>
               </div>
           `;

           // 輕鐵 + K75P 抓取邏輯（與之前相同）
           // ... (保持你原本的 fetchETA 邏輯，這裡省略以節省篇幅，你可以把之前的 fetchETA 內容貼進來)
           // 為簡潔這裡先呼叫原本函數
           await fetchETA(); // 你可以把原本 fetchETA 內容移到這裡
       }

       async function fetchTuenMun() {
           const section = document.getElementById('transport-section');
           section.innerHTML = `
               <div class="route-card lrt-card">
                   <div class="route-info"><span class="route-name">輕鐵 505</span><span class="route-dest">往 屯門碼頭</span></div>
                   <div class="eta-container" id="eta-505"><span class="eta-time">連線中...</span></div>
               </div>
               <div class="route-card lrt-card">
                   <div class="route-info"><span class="route-name">輕鐵 507</span><span class="route-dest">往 屯門碼頭</span></div>
                   <div class="eta-container" id="eta-507"><span class="eta-time">連線中...</span></div>
               </div>
               <div class="route-card bus-card">
                   <div class="route-info"><span class="route-name">港鐵巴士 506</span><span class="route-dest">往 兆麟</span></div>
                   <div class="eta-container" id="eta-506"><span class="eta-time">連線中...</span></div>
               </div>
           `;

           // TODO: 加入屯門站的 API 抓取邏輯 (LRT station_id 不同)
           console.log("屯門模式 - 開發中...");
       }

       async function fetchETA() {
           // 天水圍原有邏輯（保持不變）
           // ... 你的原本 fetchETA 內容 ...
           // 這裡先留空，你可以貼回之前的 fetchETA 內容
       }

       // 切換按鈕
       document.getElementById('mode-btn').addEventListener('click', () => {
           currentMode = currentMode === 'tinshui' ? 'tuenmun' : 'tinshui';
           const btn = document.getElementById('mode-btn');
           const title = document.getElementById('header-title');

           if (currentMode === 'tuenmun') {
               btn.textContent = '切換至天水圍';
               title.textContent = 'Tuen Mun MTR/BUS Hub';
               fetchTuenMun();
           } else {
               btn.textContent = '切換至屯門';
               title.textContent = 'Tin Shui MTR/BUS Hub';
               fetchTinShui();
           }
       });

       async function fetchWeather() {
           try {
               const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
               const data = await res.json();
               const wlTemp = data.temperature.data.find(i => i.place === '濕地公園') || data.temperature.data[0];
               document.getElementById('weather-temp').innerText = `${wlTemp.value} °C`;
               document.getElementById('weather-humidity').innerText = `濕度: ${data.humidity.data[0].value}%`;
           } catch (e) {
               console.error("Weather Error:", e);
           }
       }

       function init() {
           fetchTinShui();
           fetchWeather();
       }
       setInterval(() => {
           if (currentMode === 'tinshui') fetchTinShui();
           else fetchTuenMun();
           fetchWeather();
       }, 30000);

       init();
   </script>
</body>
</html>
